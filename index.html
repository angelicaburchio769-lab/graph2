                    "竹资源与手工竹编": {
                        description: "毛竹为本地核心山林资源，包括簸箕编织技艺等传统手工。",
                        details: "竹囮村因四面遍布毛竹山得名。簸箕编织约半小时完成一件，匠人常年制作。",
                        children: {
                            "毛竹资源": "竹囮村因四面遍布毛竹山得名，毛竹为本地核心山林资源。",
                            "簸箕编织技艺": "约半小时完成一件；采伐、劈分、削刮、编织成型等步骤。匠人每日可编 4 件，现价约 30 元/套。",
                            "夯土民居现状": "本地已不再新建夯土房屋，仅古村落修缮传统老宅时仍用竹编工具。"
                        }
                    },
                    "村落文旅与媒体传播": {
                        description: "包括文旅价值、文化礼堂、传承意义等。",
                        details: "每年庙会吸引各地摄影爱好者、游客前来采风。文化礼堂被中新网报道为浙江乡村文化典型案例。",
                        children: {
                            "文旅价值": "每年庙会吸引各地摄影爱好者、游客前来采风，带动古村落旅游。竹林成片、古树参天、溪水潺潺。",
                            "文化礼堂": "庙会以村级文化礼堂为组织阵地，成为乡村精神文化活动标杆。",
                            "传承意义": "先锋庙会是竹囮村一年最盛大集体活动，维系宗族乡情、传承山区乡土信仰。"
                        }
                    },
                    "后山古墓": {
                        description: "后山上有一座古墓，根据古墓所用石料及制作精细程度推断墓主地位显赫。",
                        details: "墓前山岗即为村民所说的'龙脉'。是否属于郑娘娘之墓已无从考证。",
                        children: {}
                    }
                }
            }
        };

        const nodesData = [];
        const linksData = [];
        let nodeId = 0;
        const nodeMap = {};

        const centerX = 500;
        const centerY = 350;
        const levels = [];

        Object.keys(knowledgeData).forEach((village, idx) => {
            const id = nodeId++;
            nodeMap[village] = id;
            const offset = idx === 0 ? -200 : 200;
            nodesData.push({id, name: village, level: 1, symbolSize: 80, itemStyle: {color: '#667eea'}, data: knowledgeData[village], x: centerX + offset, y: centerY});
            levels.push({village, x: centerX + offset, y: centerY, subNodes: Object.keys(knowledgeData[village].subNodes)});
        });

        levels.forEach((level, levelIdx) => {
            const subNodes = level.subNodes;
            const radius1 = 150;
            subNodes.forEach((subNode, idx) => {
                const key = `${level.village}-${subNode}`;
                const id = nodeId++;
                nodeMap[key] = id;
                const angle = (idx / subNodes.length) * Math.PI * 2 - Math.PI / 2;
                const x = level.x + Math.cos(angle) * radius1;
                const y = level.y + Math.sin(angle) * radius1;
                nodesData.push({id, name: subNode, level: 2, symbolSize: 50, itemStyle: {color: '#a3e635'}, data: knowledgeData[level.village].subNodes[subNode], x, y});
                linksData.push({source: nodeMap[level.village], target: id});

                const children = knowledgeData[level.village].subNodes[subNode].children;
                const childKeys = Object.keys(children);
                const radius2 = 250;
                childKeys.forEach((child, cIdx) => {
                    const childValue = children[child];
                    const childKey = `${key}-${child}`;
                    const childId = nodeId++;
                    nodeMap[childKey] = childId;
                    const angle2 = angle + ((cIdx - childKeys.length / 2 + 0.5) / childKeys.length) * Math.PI * 0.6;
                    const cx = level.x + Math.cos(angle2) * radius2;
                    const cy = level.y + Math.sin(angle2) * radius2;
                    if (childValue && typeof childValue === 'object' && !Array.isArray(childValue)) {
                        nodesData.push({id: childId, name: child, level: 3, symbolSize: 35, itemStyle: {color: '#f97316'}, data: {description: childValue.description || '', details: childValue.details || '', children: childValue.children || {}}, x: cx, y: cy});
                        linksData.push({source: id, target: childId});
                        Object.keys(childValue.children || {}).forEach((grandChild, gcIdx) => {
                            const grandChildId = nodeId++;
                            const grandChildKey = `${childKey}-${grandChild}`;
                            nodeMap[grandChildKey] = grandChildId;
                            const angle3 = angle2 + ((gcIdx - Object.keys(childValue.children).length / 2 + 0.5) / Object.keys(childValue.children).length) * Math.PI * 0.4;
                            const gx = level.x + Math.cos(angle3) * (radius2 + 80);
                            const gy = level.y + Math.sin(angle3) * (radius2 + 80);
                            nodesData.push({id: grandChildId, name: grandChild, level: 4, symbolSize: 28, itemStyle: {color: '#0ea5e9'}, data: {description: childValue.children[grandChild]}, x: gx, y: gy});
                            linksData.push({source: childId, target: grandChildId});
                        });
                    } else {
                        nodesData.push({id: childId, name: child, level: 3, symbolSize: 35, itemStyle: {color: '#f97316'}, data: {description: childValue}, x: cx, y: cy});
                        linksData.push({source: id, target: childId});
                    }
                });
            });
        });

        let selectedNodeId = null;
        let isAnimating = true;
        let historyStack = [];

        const chart = echarts.init(document.getElementById('chart'));
        
        function updateChart() {
            const option = {
                title: {text: '官岭村与竹囮村知识图谱', left: 'center', top: 20, textStyle: {color: '#333', fontSize: 18, fontWeight: 'bold'}},
                tooltip: {trigger: 'item', formatter: p => p.data ? p.data.name : p.name},
                series: [{
                    type: 'graph',
                    layout: isAnimating ? 'force' : 'none',
                    force: isAnimating ? {
                        repulsion: 100,
                        gravity: 0.1,
                        edgeLength: [80, 200],
                        layoutAnimation: true,
                        friction: 0.7
                    } : null,
                    roam: true,
                    draggable: false,
                    data: nodesData.map(node => ({
                        ...node,
                        x: node.x,
                        y: node.y,
                        itemStyle: {...node.itemStyle, shadowBlur: node.id === selectedNodeId ? 30 : 10, shadowColor: node.id === selectedNodeId ? node.itemStyle.color : 'rgba(0,0,0,0.2)', borderWidth: node.id === selectedNodeId ? 4 : 2, borderColor: '#fff'},
                        label: {show: true, formatter: node.name, fontSize: node.id === selectedNodeId ? 14 : 11, fontWeight: 'bold', color: node.id === selectedNodeId ? '#333' : '#666'},
                        emphasis: {scale: true, scaleSize: 10, label: {show: true, fontSize: 14}, itemStyle: {borderWidth: 4, shadowBlur: 30, shadowColor: node.itemStyle.color}}
                    })),
                    links: linksData,
                    lineStyle: {color: '#ccc', width: 1, opacity: 0.6, curveness: 0.1}
                }]
            };
            chart.setOption(option, true);
        }

        updateChart();

        setTimeout(() => {
            isAnimating = false;
            const model = chart._model;
            if (model && model.series[0] && model.series[0].data) {
                const data = model.series[0].data;
                for (let i = 0; i < nodesData.length; i++) {
                    const item = data.getItem(i);
                    if (item && item.x !== undefined) {
                        nodesData[i].x = item.x;
                        nodesData[i].y = item.y;
                    }
                }
            }
            updateChart();
        }, 2000);

        function focusNode(nodeId) {
            selectedNodeId = nodeId;
            updateChart();
        }

        chart.on('click', function(params) {
            if (params.data) {
                selectedNodeId = params.data.id;
                focusNode(params.data.id);
                historyStack.push(params.data);
                displayInfo(params.data);
            }
        });

        function buildBreadcrumb(node) {
            const path = [];
            let current = node;
            while (current) {
                path.unshift(current);
                const link = linksData.find(l => l.target === current.id);
                current = link ? nodesData.find(n => n.id === link.source) : null;
            }
            return '<div class="breadcrumb">' + path.map((item, idx) => '<span class="' + (idx === path.length - 1 ? '' : 'breadcrumb-item') + '" ' + (idx !== path.length - 1 ? 'onclick="goToNode(' + item.id + ', event)"' : '') + '>' + item.name + '</span>' + (idx < path.length - 1 ? ' › ' : '')).join('') + '</div>';
        }

        function displayInfo(node) {
            const infoPanel = document.getElementById('info-panel');
            let html = '<button class="back-btn" onclick="goBack()">← 回到上一级</button>' + buildBreadcrumb(node);

            if (node.level === 1) {
                html += '<div class="card"><div class="card-title">📍 ' + node.name + '</div><div class="card-content">' + node.data.description + '</div><div class="sub-nodes"><strong>📚 下属部分：</strong>' + Object.keys(node.data.subNodes).map((sub, idx) => '<div class="sub-node-item" onclick="jumpToNode(\'' + node.name + '-' + sub + '\', event)"><span>' + (idx + 1) + '. ' + sub + '</span><span class="nav-arrow">→</span></div>').join('') + '</div></div>';
            } else if (node.level === 2) {
                html += '<div class="card"><div class="card-title">📘 ' + node.name + '</div><div class="card-content">' + node.data.description + '</div><div class="details"><strong style="color: #667eea;">📄 详细信息：</strong><div class="detail-text">' + node.data.details + '</div></div><div class="sub-nodes"><strong>🔍 子项目：</strong>' + Object.keys(node.data.children).map((child, idx) => { const pk = linksData.find(l => l.target === node.id).source; const pn = nodesData.find(n => n.id === pk); return '<div class="sub-node-item" onclick="jumpToNode(\'' + pn.name + '-' + node.name + '-' + child + '\', event)"><span>' + (idx + 1) + '. ' + child + '</span><span class="nav-arrow">→</span></div>'; }).join('') + '</div></div>';
            } else if (node.level === 3) {
                html += '<div class="card"><div class="card-title">📄 ' + node.name + '</div><div class="details"><div class="detail-text">' + (node.data.description || '') + '</div></div>' + (node.data.details ? '<div class="details"><strong style="color: #667eea;">📄 详细信息：</strong><div class="detail-text">' + node.data.details + '</div></div>' : '') + '<div class="sub-nodes"><strong>🔍 子项目：</strong>' + (node.data.children && Object.keys(node.data.children).length ? Object.keys(node.data.children).map((child, idx) => { const pk = linksData.find(l => l.target === node.id).source; const pn = nodesData.find(n => n.id === pk); const gpk = linksData.find(l => l.target === pn.id).source; const gpn = nodesData.find(n => n.id === gpk); return '<div class="sub-node-item" onclick="jumpToNode(\'' + gpn.name + '-' + pn.name + '-' + node.name + '-' + child + '\', event)"><span>' + (idx + 1) + '. ' + child + '</span><span class="nav-arrow">→</span></div>'; }).join('') : '<span style="color: #999;">暂无子节点</span>') + '</div></div>';
            } else if (node.level === 4) {
                html += '<div class="card"><div class="card-title">🔹 ' + node.name + '</div><div class="details"><div class="detail-text">' + (node.data.description || '') + '</div></div><div class="sub-nodes"><strong>🔍 子项目：</strong><span style="color: #999;">暂无子节点</span></div></div>';
            }

            infoPanel.innerHTML = html;
        }

        window.goBack = function() {
            if (historyStack.length > 1) {
                historyStack.pop();
                const prevNode = historyStack[historyStack.length - 1];
                focusNode(prevNode.id);
                displayInfo(prevNode);
            }
        };

        window.goToNode = function(nodeId, event) {
            if (event) event.stopPropagation();
            const node = nodesData.find(n => n.id === nodeId);
            if (node) {
                historyStack = [];
                focusNode(node.id);
                displayInfo(node);
            }
        };

        window.jumpToNode = function(key, event) {
            event.stopPropagation();
            const nodeId = nodeMap[key];
            if (nodeId !== undefined) {
                const node = nodesData.find(n => n.id === nodeId);
                if (node) {
                    historyStack.push(node);
                    focusNode(nodeId);
                    displayInfo(node);
                }
            }
        };

        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
